name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - "29.4"
          - "30.2"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run tests
        run: |
          emacs --batch \
            --load annotated-completing-read.el \
            --load test/test-annotated-completing-read.el \
            --eval '(ert-run-tests-batch-and-exit "annotated-completing-read")'
